<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>💕 恋爱日记</title>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #fff9f7;
            color: #4a3a3a;
        }
        /* 启动页 */
        #startPage {
            position: fixed;
            inset: 0;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, #fceae8, #fff5f0);
            transition: opacity 0.8s;
        }
        #startPage.hidden {
            opacity: 0;
            pointer-events: none;
        }
        #startPage h1 {
            font-size: 2.4rem;
            font-weight: 300;
            color: #c27a6e;
            letter-spacing: 6px;
            margin-bottom: 0.5rem;
        }
        #startPage .logo {
            font-size: 4rem;
            margin-bottom: 0.2rem;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-12px);
            }
        }
        .date-input-wrap {
            display: flex;
            gap: 14px;
            background: rgba(255, 255, 255, 0.7);
            padding: 18px 30px;
            border-radius: 60px;
            box-shadow: 0 8px 32px rgba(180, 120, 100, 0.15);
            backdrop-filter: blur(8px);
        }
        .date-input-wrap input[type="date"] {
            border: none;
            background: transparent;
            font-size: 1rem;
            padding: 8px 12px;
            border-radius: 30px;
            outline: 2px solid #eccfc6;
            font-family: inherit;
        }
        .date-input-wrap button {
            background: #dba89a;
            border: none;
            color: #fff;
            font-size: 1rem;
            padding: 8px 28px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.25s;
            font-family: inherit;
        }
        .date-input-wrap button:hover {
            background: #c99181;
        }
        .error-msg {
            color: #d47a6a;
            font-size: 0.9rem;
            margin-top: 12px;
            min-height: 1.5rem;
        }
        /* 主应用 */
        #app {
            display: none;
            flex-direction: column;
            min-height: 100vh;
        }
        #app.show {
            display: flex;
        }
        .topbar {
            background: rgba(255, 248, 245, 0.85);
            backdrop-filter: blur(12px);
            padding: 14px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            border-bottom: 1px solid rgba(220, 180, 165, 0.2);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .topbar .brand {
            font-size: 1.3rem;
            color: #c27a6e;
        }
        .topbar .days {
            background: #f5e3dd;
            padding: 5px 18px;
            border-radius: 30px;
            font-size: 0.95rem;
            color: #a66b5e;
        }
        .topbar .nav button {
            background: transparent;
            border: none;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 0.9rem;
            color: #a66b5e;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
        }
        .topbar .nav button.active {
            background: #dba89a;
            color: #fff;
            font-weight: 500;
        }
        .sections {
            flex: 1;
            padding: 24px 28px;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }
        .section {
            display: none;
            animation: fadeUp 0.4s ease;
        }
        .section.active {
            display: block;
        }
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .section-title {
            font-size: 1.6rem;
            font-weight: 300;
            color: #c27a6e;
            margin-bottom: 18px;
            letter-spacing: 2px;
        }
        /* 地球 */
        #earthContainer {
            position: relative;
            width: 100%;
            height: 600px;
            border-radius: 28px;
            overflow: hidden;
            background: #0b0e1a;
        }
        .earth-toolbar {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(8px);
            padding: 10px 20px;
            border-radius: 50px;
            z-index: 10;
            pointer-events: none;
        }
        .earth-toolbar>* {
            pointer-events: auto;
        }
        .earth-toolbar input {
            padding: 6px 16px;
            border-radius: 30px;
            border: none;
            background: rgba(255, 255, 255, 0.12);
            color: #fff;
            width: 140px;
            font-family: inherit;
            outline: 1px solid rgba(255, 255, 255, 0.1);
        }
        .earth-toolbar input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }
        .earth-toolbar button {
            padding: 6px 20px;
            border-radius: 30px;
            border: none;
            background: #dba89a;
            color: #fff;
            cursor: pointer;
            font-family: inherit;
        }
        .earth-toolbar .hint {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.75rem;
            display: flex;
            align-items: center;
        }

        /* 弹窗 */
        .modal {
            position: fixed;
            inset: 0;
            z-index: 500;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal.open {
            display: flex;
        }
        .modal-box {
            background: #fffbf9;
            border-radius: 28px;
            max-width: 600px;
            width: 100%;
            max-height: 80vh;
            padding: 28px 30px 24px;
            overflow-y: auto;
            position: relative;
        }
        .modal-box .close-btn {
            position: absolute;
            top: 16px;
            right: 20px;
            font-size: 1.8rem;
            cursor: pointer;
            background: none;
            border: none;
            color: #b2867c;
        }
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 10px;
            margin: 14px 0;
        }
        .photo-item {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 1/1;
            background: #f5ecea;
            border: 1px solid #f0e0da;
        }
        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .photo-item .del-btn {
            position: absolute;
            top: 4px;
            right: 4px;
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            font-size: 0.8rem;
            cursor: pointer;
        }
        .photo-upload label {
            background: #f5e3dd;
            padding: 6px 18px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.85rem;
            color: #a66b5e;
            border: 1px dashed #dba89a;
            display: inline-block;
        }
        .photo-upload input {
            display: none;
        }
        .city-note-area textarea {
            width: 100%;
            border: 1px solid #f0e0da;
            border-radius: 16px;
            padding: 10px 14px;
            font-size: 0.9rem;
            font-family: inherit;
            resize: vertical;
            min-height: 60px;
            margin-top: 10px;
        }
        .city-note-area button {
            margin-top: 6px;
            padding: 4px 18px;
            border-radius: 30px;
            border: none;
            background: #dba89a;
            color: #fff;
            cursor: pointer;
            font-family: inherit;
        }
        /* 日历 */
        .calendar-wrap {
            background: #fffbf9;
            border-radius: 28px;
            padding: 24px 28px;
            max-width: 820px;
            margin: 0 auto;
        }
        .calendar-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 18px;
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }
        .calendar-grid .week-label {
            text-align: center;
            font-size: 0.8rem;
            color: #b2867c;
            padding: 6px 0;
        }
        .calendar-grid .day-cell {
            aspect-ratio: 1/1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            cursor: pointer;
            font-size: 0.9rem;
            border: none;
            background: transparent;
            font-family: inherit;
            position: relative;
        }
        .calendar-grid .day-cell:hover {
            background: #f5ecea;
        }
        .calendar-grid .day-cell.other-month {
            color: #ccc0ba;
        }
        .calendar-grid .day-cell .mood-icon {
            font-size: 0.6rem;
            line-height: 1;
            margin-top: 1px;
        }
        .calendar-grid .day-cell.has-record::after {
            content: '';
            position: absolute;
            bottom: 4px;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: #dba89a;
        }
        .calendar-grid .day-cell.today {
            outline: 2px solid #dba89a;
        }
        /* 记录弹窗 */
        .record-modal .mood-selector {
            display: flex;
            gap: 10px;
            margin: 12px 0;
        }
        .record-modal .mood-selector button {
            font-size: 1.6rem;
            background: none;
            border: 2px solid transparent;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            cursor: pointer;
        }
        .record-modal .mood-selector button.active {
            border-color: #dba89a;
            background: #f5ecea;
        }
        .record-modal textarea {
            width: 100%;
            border: 1px solid #f0e0da;
            border-radius: 16px;
            padding: 14px 16px;
            font-size: 0.95rem;
            font-family: inherit;
            min-height: 80px;
        }
        .record-modal .btn-row {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 16px;
        }
        .record-modal .btn-row button {
            padding: 8px 28px;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            font-family: inherit;
        }
        .record-modal .btn-row .save-btn {
            background: #dba89a;
            color: #fff;
        }
        .record-modal .btn-row .del-btn {
            background: #f5ecea;
            color: #a66b5e;
        }
        /* 碎碎念 */
        .memo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
        }
        .memo-card {
            background: #fffbf9;
            border-radius: 24px;
            padding: 22px 24px 18px;
            border: 1px solid #f0e0da;
            display: flex;
            flex-direction: column;
        }
        .memo-card .memo-title {
            font-size: 1.05rem;
            font-weight: 500;
            color: #c27a6e;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }
        .memo-card .memo-list {
            flex: 1;
            list-style: none;
            padding: 0;
            margin: 0 0 12px;
            max-height: 260px;
            overflow-y: auto;
        }
        .memo-card .memo-list li {
            padding: 8px 12px;
            margin-bottom: 4px;
            border-radius: 14px;
            background: #fcf8f6;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
        }
        .memo-card .memo-list li .del-memo {
            background: none;
            border: none;
            color: #ccc0ba;
            cursor: pointer;
        }
        .memo-card .memo-input-row {
            display: flex;
            gap: 8px;
        }
        .memo-card .memo-input-row input {
            flex: 1;
            padding: 8px 14px;
            border-radius: 30px;
            border: 1px solid #f0e0da;
            font-family: inherit;
            font-size: 0.85rem;
        }
        .memo-card .memo-input-row button {
            padding: 6px 18px;
            border-radius: 30px;
            border: none;
            background: #dba89a;
            color: #fff;
            cursor: pointer;
            font-family: inherit;
        }
        /* 音频 */
        .audio-wrap {
            max-width: 680px;
            margin: 0 auto;
        }
        .audio-upload-area {
            background: #fffbf9;
            border: 2px dashed #f0e0da;
            border-radius: 28px;
            padding: 30px 20px;
            text-align: center;
            margin-bottom: 24px;
        }
        .audio-upload-area label {
            display: inline-block;
            padding: 10px 36px;
            background: #dba89a;
            color: #fff;
            border-radius: 40px;
            cursor: pointer;
            font-family: inherit;
        }
        .audio-upload-area input {
            display: none;
        }
        .audio-item {
            background: #fffbf9;
            border-radius: 20px;
            padding: 16px 20px;
            border: 1px solid #f0e0da;
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }
        .audio-item audio {
            flex: 1;
            min-width: 140px;
            height: 40px;
        }
        .audio-item .del-audio {
            background: none;
            border: none;
            color: #ccc0ba;
            cursor: pointer;
            font-size: 1.1rem;
        }
        @media (max-width:720px) {
            #earthContainer {
                height: 400px;
            }
            .topbar {
                flex-direction: column;
                align-items: stretch;
                gap: 8px;
            }
            .topbar .nav {
                display: flex;
                justify-content: center;
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>

    <!-- 启动页 -->
    <div id="startPage">
        <div class="logo">💕</div>
        <h1>我们的恋爱日记</h1>
        <div class="date-input-wrap">
            <label>📅 相遇之日</label>
            <input type="date" id="startDateInput" />
            <button id="enterBtn">✨ 开启</button>
        </div>
        <div class="error-msg" id="startError"></div>
    </div>

    <!-- 主应用 -->
    <div id="app">
        <header class="topbar">
            <div class="brand">💕 恋爱日记</div>
            <div class="days" id="daysDisplay">❤️ 已相伴 <strong>0</strong> 天</div>
            <nav class="nav">
                <button class="active" data-section="section-earth">🌍 一路向哪</button>
                <button data-section="section-calendar">📅 每一天</button>
                <button data-section="section-memo">💭 碎碎念</button>
                <button data-section="section-audio">🎧 听得到</button>
            </nav>
        </header>

        <div class="sections">
            <!-- 地球 -->
            <div class="section active" id="section-earth">
                <div class="section-title">🌍 一路向哪</div>
                <div id="earthContainer">
                    <div class="earth-toolbar">
                        <input type="text" id="cityInput" placeholder="城市名" />
                        <button id="addCityBtn">📍 添加</button>
                        <span class="hint">💡 点击光点</span>
                    </div>
                </div>
            </div>

            <!-- 日历 -->
            <div class="section" id="section-calendar">
                <div class="section-title">📅 每一天的我们</div>
                <div class="calendar-wrap">
                    <div class="calendar-header">
                        <div class="year-month" id="calYearMonth">2026年 6月</div>
                        <div>
                            <button id="calPrev">‹</button>
                            <button id="calNext">›</button>
                            <button id="calToday">今天</button>
                        </div>
                    </div>
                    <div class="calendar-grid" id="calendarGrid"></div>
                </div>
            </div>

            <!-- 碎碎念 -->
            <div class="section" id="section-memo">
                <div class="section-title">💭 碎碎念</div>
                <div class="memo-grid" id="memoGrid"></div>
            </div>

            <!-- 音频 -->
            <div class="section" id="section-audio">
                <div class="section-title">🎧 你听得到</div>
                <div class="audio-wrap">
                    <div class="audio-upload-area">
                        <label for="audioFileInput">📤 上传音频</label>
                        <input type="file" id="audioFileInput" accept="audio/*" multiple />
                    </div>
                    <div class="audio-list" id="audioList"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 照片弹窗 -->
    <div class="modal" id="photoModal">
        <div class="modal-box">
            <button class="close-btn" id="photoModalClose">✕</button>
            <h3 id="photoModalTitle">📍 城市</h3>
            <div class="photo-grid" id="photoGrid"></div>
            <div class="photo-upload">
                <label for="photoUploadInput">📷 添加照片</label>
                <input type="file" id="photoUploadInput" accept="image/*" multiple />
            </div>
            <div class="city-note-area">
                <textarea id="cityNoteInput" placeholder="添加文字记忆…"></textarea>
                <button id="cityNoteSave">💾 保存</button>
            </div>
        </div>
    </div>

    <!-- 日历记录弹窗 -->
    <div class="modal record-modal" id="recordModal">
        <div class="modal-box">
            <h3 id="recordModalTitle">📝 记录</h3>
            <textarea id="recordText" placeholder="今天发生了什么…"></textarea>
            <div class="mood-selector" id="moodSelector">
                <button data-mood="😊">😊</button>
                <button data-mood="😢">😢</button>
                <button data-mood="❤️">❤️</button>
                <button data-mood="😡">😡</button>
                <button data-mood="🎉">🎉</button>
                <button data-mood="😴">😴</button>
            </div>
            <div class="btn-row">
                <button class="close-modal-btn" id="recordCloseBtn">取消</button>
                <button class="del-btn" id="recordDelBtn">🗑 删除</button>
                <button class="save-btn" id="recordSaveBtn">💾 保存</button>
            </div>
        </div>
    </div>

    <script type="module">
        // ============================================================
        // 精简完整版 - 恋爱日记
        // ============================================================

        // ----- 导入 Three.js -----
        let THREE, OrbitControls;
        try {
            const module = await import('three');
            THREE = module;
            const controlsModule = await import('three/addons/controls/OrbitControls.js');
            OrbitControls = controlsModule.OrbitControls;
            console.log('✅ Three.js loaded');
        } catch (e) {
            console.error('❌ Three.js failed', e);
            window.THREE_FAIL = true;
        }

        // ----- 存储 -----
        const STORAGE_KEY = 'love_diary_data';
        const DEFAULT_DATA = {
            startDate: '',
            cities: {},
            calendar: {},
            memos: {
                touched: ['💕 他今天突然出现在公司楼下', '🌧️ 雨天的伞都给我了', '🍜 记住了我爱吃的面'],
                angry: ['😤 电影迟到半小时', '📱 打游戏不理人', '🍽️ 点菜不管我'],
                todo: ['📌 准备纪念日惊喜', '✈️ 国庆旅行计划', '🎁 买球鞋给他']
            },
            audios: []
        };

        function loadData() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (!raw) {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(DEFAULT_DATA));
                    return JSON.parse(JSON.stringify(DEFAULT_DATA));
                }
                const data = JSON.parse(raw);
                for (const k in DEFAULT_DATA) {
                    if (!(k in data)) data[k] = DEFAULT_DATA[k];
                }
                for (const mk of ['touched', 'angry', 'todo']) {
                    if (!data.memos[mk] || data.memos[mk].length === 0) {
                        data.memos[mk] = DEFAULT_DATA.memos[mk];
                    }
                }
                localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
                return data;
            } catch { return JSON.parse(JSON.stringify(DEFAULT_DATA)); }
        }

        function saveData(data) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        function formatDate(d) {
            const y = d.getFullYear();
            const m = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${y}-${m}-${day}`;
        }

        function parseDate(str) {
            const p = str.split('-').map(Number);
            return new Date(p[0], p[1] - 1, p[2]);
        }

        function getDaysDiff(d1, d2) {
            const t1 = new Date(d1.getFullYear(), d1.getMonth(), d1.getDate());
            const t2 = new Date(d2.getFullYear(), d2.getMonth(), d2.getDate());
            return Math.floor((t2 - t1) / (1000 * 60 * 60 * 24));
        }

        // ----- 城市坐标（部分） -----
        const CITY_COORDS = {
            '北京': { lat: 39.9, lng: 116.4 },
            '上海': { lat: 31.2, lng: 121.5 },
            '成都': { lat: 30.6, lng: 104.1 },
            '南京': { lat: 32.1, lng: 118.8 },
            '杭州': { lat: 30.3, lng: 120.2 },
            '合肥': { lat: 31.8, lng: 117.2 },
            '南昌': { lat: 28.7, lng: 115.9 },
            '长沙': { lat: 28.2, lng: 113.0 },
            '武汉': { lat: 30.6, lng: 114.3 },
            '广州': { lat: 23.1, lng: 113.3 },
            '深圳': { lat: 22.5, lng: 114.1 },
            '重庆': { lat: 29.6, lng: 106.5 },
            '西安': { lat: 34.3, lng: 108.9 },

        function latLngToPosition(lat, lng, radius) {
            const phi = (90 - lat) * Math.PI / 180;
            const theta = (lng + 180) * Math.PI / 180;
            return new THREE.Vector3(
                -radius * Math.sin(phi) * Math.cos(theta),
                radius * Math.cos(phi),
                radius * Math.sin(phi) * Math.sin(theta)
            );
        }

            camera = new THREE.PerspectiveCamera(45, w / h, 0.1, 1000);

            if (old) old.remove();
            container.insertBefore(renderer.domElement, toolbar);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.08;
            controls.rotateSpeed = 0.6;
            controls.minDistance = 1.8;
            controls.maxDistance = 6;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 0.4;

            // 灯光
            scene.add(new THREE.AmbientLight(0x404060, 0.6));
            const d = new THREE.DirectionalLight(0xffffff, 1.8);
            d.position.set(5, 3, 5);
            scene.add(d);
            const b = new THREE.DirectionalLight(0x8888ff, 0.4);
            b.position.set(-3, -1, -4);
            scene.add(b);

            // 星星
            const stars = new THREE.BufferGeometry();
            const pos = new Float32Array(2000 * 3);
            for (let i = 0; i < 2000 * 3; i++) pos[i] = (Math.random() - 0.5) * 200;
            stars.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.15, transparent: true, opacity: 0.8 });
            scene.add(new THREE.Points(stars, starMat));

            // 地球
            const radius = 1.2;
            const geo = new THREE.SphereGeometry(radius, 64, 64);
            const tex = new THREE.TextureLoader().load('https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg');
            const mat = new THREE.MeshPhongMaterial({ map: tex, specular: new THREE.Color(0x333355), shininess: 8 });
            const earth = new THREE.Mesh(geo, mat);
            earthGroup = new THREE.Group();
            earthGroup.add(earth);
            scene.add(earthGroup);

            // 光晕
            const glow = new THREE.Mesh(
                new THREE.SphereGeometry(radius * 1.01, 48, 48),
                new THREE.MeshBasicMaterial({ color: 0x4488ff, transparent: true, opacity: 0.05, side: THREE.BackSide })
            );
            earthGroup.add(glow);

            loadCityMarkers();

            earthInitialized = true;
            animate();

            // 点击检测
            const raycaster = new THREE.Raycaster();
            const mouse = new THREE.Vector2();
            renderer.domElement.style.cursor = 'default';
            renderer.domElement.addEventListener('click', (e) => {
                const rect = renderer.domElement.getBoundingClientRect();
                mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
                mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
                raycaster.setFromCamera(mouse, camera);
                const hits = raycaster.intersectObjects(cityMarkers);
                if (hits.length > 0) {
                    const obj = hits[0].object;
                    if (obj.userData.cityName) openPhotoModal(obj.userData.cityName);
                }
            });

            addCityBtn.addEventListener('click', () => {
                const name = cityInput.value.trim();
                if (!name) { alert('请输入城市名'); return; }
                addCity(name);
            });
            cityInput.addEventListener('keydown', e => { if (e.key === 'Enter') addCityBtn.click(); });
        }

        function animate() {
            if (!earthInitialized) return;
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        function onEarthResize() {
            if (!earthInitialized || !renderer) return;
            const w = earthContainer.clientWidth || 600;
            const h = earthContainer.clientHeight || 600;
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h);
        }

        function loadCityMarkers() {
            if (!earthGroup) return;
            cityMarkers.forEach(m => { if (m.parent) m.parent.remove(m); });
            cityMarkers = [];
            const radius = 1.2;
            for (const name in data.cities) {
                const info = data.cities[name];
                const pos = latLngToPosition(info.lat, info.lng, radius);
                const marker = createMarker(pos, name);
                earthGroup.add(marker);
                cityMarkers.push(marker);
            }
        }

        function createMarker(position, cityName) {
            const size = 0.05; // 更小
            const geo = new THREE.SphereGeometry(size, 12, 12);
            const mat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.copy(position);
            mesh.userData.cityName = cityName;
            // 光晕
            const glow = new THREE.Mesh(
                new THREE.SphereGeometry(size * 2.5, 12, 12),
                new THREE.MeshBasicMaterial({ color: 0x88ccff, transparent: true, opacity: 0.25 })
            );
            glow.position.copy(position);
            mesh.add(glow);
            // 细线
            const dir = position.clone().normalize();
            const points = [dir.clone().multiplyScalar(1.2), dir.clone().multiplyScalar(1.25)];
            const lineGeo = new THREE.BufferGeometry().setFromPoints(points);
            const lineMat = new THREE.LineBasicMaterial({ color: 0x88ccff, transparent: true, opacity: 0.3 });
            const line = new THREE.Line(lineGeo, lineMat);
            mesh.add(line);
            return mesh;
        }

        function addCity(name) {
            if (data.cities[name]) { alert('已存在'); return; }
            let coords = CITY_COORDS[name];
            if (!coords) {
                const keys = Object.keys(CITY_COORDS);
                const match = keys.find(k => k.includes(name) || name.includes(k));
                if (match) coords = CITY_COORDS[match];
            }
            if (!coords) { alert('未知城市，换个试试'); return; }
            data.cities[name] = { lat: coords.lat, lng: coords.lng, photos: [], note: '' };
            saveData(data);
            loadCityMarkers();
            cityInput.value = '';
            if (controls) controls.autoRotate = true;
        }

        // ===== 照片弹窗 =====
        function openPhotoModal(cityName) {
            currentCityForPhotos = cityName;
            photoModalTitle.textContent = `📍 ${cityName}`;
            const city = data.cities[cityName];
            if (city) cityNoteInput.value = city.note || '';
            renderPhotos(cityName);
            photoModal.classList.add('open');
            if (controls) controls.autoRotate = false;
        }

        function closePhotoModal() {
            photoModal.classList.remove('open');
            if (controls) controls.autoRotate = true;
        }

        function renderPhotos(cityName) {
            const city = data.cities[cityName];
            if (!city) return;
            const photos = city.photos || [];
            photoGrid.innerHTML = '';
            if (photos.length === 0) {
                photoGrid.innerHTML = '<div style="color:#b2867c;padding:10px;">还没有照片 ✨</div>';
            } else {
                photos.forEach((src, i) => {
                    const div = document.createElement('div');
                    div.className = 'photo-item';
                    const img = document.createElement('img');
                    img.src = src;
                    div.appendChild(img);
                    const del = document.createElement('button');
                    del.className = 'del-btn';
                    del.textContent = '✕';
                    del.addEventListener('click', (e) => {
                        e.stopPropagation();
                        city.photos.splice(i, 1);
                        saveData(data);
                        renderPhotos(cityName);
                    });
                    div.appendChild(del);
                    photoGrid.appendChild(div);
                });
            }
        }

        photoUploadInput.addEventListener('change', (e) => {
            const files = e.target.files;
            if (!files) return;
            const cityName = currentCityForPhotos;
            if (!cityName) return;
            const city = data.cities[cityName];
            if (!city) return;
            for (const file of files) {
                if (!file.type.startsWith('image/')) continue;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    city.photos.push(ev.target.result);
                    saveData(data);
                    renderPhotos(cityName);
                };
                reader.readAsDataURL(file);
            }
            photoUploadInput.value = '';
        });

        cityNoteSave.addEventListener('click', () => {
            const cityName = currentCityForPhotos;
            if (!cityName) return;
            const city = data.cities[cityName];
            if (!city) return;
            city.note = cityNoteInput.value.trim();
            saveData(data);
            alert('✅ 文字已保存');
        });

        photoModalClose.addEventListener('click', closePhotoModal);
        photoModal.addEventListener('click', (e) => { if (e.target === photoModal) closePhotoModal(); });

        // ============================================================
        //  日历
        // ============================================================
        let calYear = new Date().getFullYear(),
            calMonth = new Date().getMonth();

        function renderCalendar() {
            const year = calYear,
                month = calMonth;
            calYearMonth.textContent = `${year}年 ${month+1}月`;
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const daysInPrev = new Date(year, month, 0).getDate();
            const today = new Date();
            const todayStr = formatDate(today);

            let html = '';
            const labels = ['日', '一', '二', '三', '四', '五', '六'];
            labels.forEach(l => html += `<div class="week-label">${l}</div>`);

            // 上月
            for (let i = daysInPrev - firstDay + 1; i <= daysInPrev; i++) {
                const d = new Date(year, month - 1, i);
                const ds = formatDate(d);
                const rec = data.calendar[ds];
                html += `<button class="day-cell other-month ${rec ? 'has-record' : ''}" data-date="${ds}">${i}${rec?.mood ? `<span class="mood-icon">${rec.mood}</span>` : ''}</button>`;
            }
            // 本月
            for (let d = 1; d <= daysInMonth; d++) {
                const dateObj = new Date(year, month, d);
                const ds = formatDate(dateObj);
                const rec = data.calendar[ds];
                const isToday = ds === todayStr;
                html += `<button class="day-cell ${rec ? 'has-record' : ''} ${isToday ? 'today' : ''}" data-date="${ds}">${d}${rec?.mood ? `<span class="mood-icon">${rec.mood}</span>` : ''}</button>`;
            }
            // 下月
            const total = firstDay + daysInMonth;
            const remaining = (7 - (total % 7)) % 7;
            for (let d = 1; d <= remaining; d++) {
                const dateObj = new Date(year, month + 1, d);
                const ds = formatDate(dateObj);
                const rec = data.calendar[ds];
                html += `<button class="day-cell other-month ${rec ? 'has-record' : ''}" data-date="${ds}">${d}${rec?.mood ? `<span class="mood-icon">${rec.mood}</span>` : ''}</button>`;
            }
            calGrid.innerHTML = html;
            calGrid.querySelectorAll('.day-cell').forEach(cell => {
                cell.addEventListener('click', () => {
                    const ds = cell.dataset.date;
                    if (ds) openRecordModal(ds);
                });
            });
        }

        calPrev.addEventListener('click', () => { calMonth--;
            if (calMonth < 0) { calMonth = 11;
                calYear--; }
            renderCalendar(); });
        calNext.addEventListener('click', () => { calMonth++;
            if (calMonth > 11) { calMonth = 0;
                calYear++; }
            renderCalendar(); });
        calToday.addEventListener('click', () => { const n = new Date();
            calYear = n.getFullYear();
            calMonth = n.getMonth();
            renderCalendar(); });

        let currentRecordDate = null,
            selectedMood = '';

        function openRecordModal(dateStr) {
            currentRecordDate = dateStr;
            const d = parseDate(dateStr);
            recordModalTitle.textContent = `📝 ${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
            const rec = data.calendar[dateStr] || { text: '', mood: '' };
            recordText.value = rec.text || '';
            selectedMood = rec.mood || '';
            moodSelector.querySelectorAll('button').forEach(b => b.classList.toggle('active', b.dataset.mood === selectedMood));
            recordDelBtn.style.display = (rec.text || rec.mood) ? 'inline-block' : 'none';
            recordModal.classList.add('open');
        }

        function closeRecordModal() {
            recordModal.classList.remove('open');
            currentRecordDate = null;
            selectedMood = '';
        }

        recordCloseBtn.addEventListener('click', closeRecordModal);
        recordModal.addEventListener('click', e => { if (e.target === recordModal) closeRecordModal(); });

        moodSelector.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', () => {
                moodSelector.querySelectorAll('button').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedMood = btn.dataset.mood;
            });
        });

        recordSaveBtn.addEventListener('click', () => {
            if (!currentRecordDate) return;
            const text = recordText.value.trim();
            const mood = selectedMood;
            if (!text && !mood) delete data.calendar[currentRecordDate];
            else data.calendar[currentRecordDate] = { text, mood };
            saveData(data);
            renderCalendar();
            closeRecordModal();
        });

        recordDelBtn.addEventListener('click', () => {
            if (!currentRecordDate) return;
            if (confirm('删除记录？')) {
                delete data.calendar[currentRecordDate];
                saveData(data);
                renderCalendar();
                closeRecordModal();
            }
        });

        // ============================================================
        //  碎碎念
        // ============================================================
        const MEMO_CONFIG = [
            { key: 'touched', icon: '💖', title: '那些好好好感动的瞬间' },
            { key: 'angry', icon: '😤', title: '那些好好好生气的瞬间' },
            { key: 'todo', icon: '📌', title: '要记住的事' }
        ];

        function renderMemos() {
            memoGrid.innerHTML = '';
            for (const cfg of MEMO_CONFIG) {
                const items = data.memos[cfg.key] || [];
                const card = document.createElement('div');
                card.className = 'memo-card';
                card.innerHTML = `
                    <div class="memo-title"><span>${cfg.icon}</span> ${cfg.title}</div>
                    <ul class="memo-list">
                        ${items.length === 0 ? '<li class="empty-hint">还没有记录 ✨</li>' : ''}
                        ${items.map((text, i) => `
                            <li>
                                <span>${text}</span>
                                <button class="del-memo" data-key="${cfg.key}" data-index="${i}">✕</button>
                            </li>
                        `).join('')}
                    </ul>
                    <div class="memo-input-row">
                        <input type="text" id="memoInput_${cfg.key}" placeholder="添加..." />
                        <button data-key="${cfg.key}">添加</button>
                    </div>
                `;
                memoGrid.appendChild(card);

                const input = card.querySelector(`#memoInput_${cfg.key}`);
                const btn = card.querySelector(`[data-key="${cfg.key}"]`);
                const add = () => {
                    const text = input.value.trim();
                    if (!text) return;
                    data.memos[cfg.key].push(text);
                    saveData(data);
                    renderMemos();
                };
                btn.addEventListener('click', add);
                input.addEventListener('keydown', e => { if (e.key === 'Enter') add(); });

                const list = card.querySelector('.memo-list');
                list.addEventListener('click', e => {
                    const del = e.target.closest('.del-memo');
                    if (!del) return;
                    const key = del.dataset.key;
                    const idx = parseInt(del.dataset.index);
                    if (!isNaN(idx)) {
                        data.memos[key].splice(idx, 1);
                        saveData(data);
                        renderMemos();
                    }
                });
            }
        }

        // ============================================================
        //  音频
        // ============================================================
        function renderAudios() {
            const audios = data.audios || [];
            if (audios.length === 0) {
                audioList.innerHTML = '<div style="text-align:center;color:#ccc;padding:40px;">🎵 还没有音频</div>';
                return;
            }
            audioList.innerHTML = audios.map((a, i) => `
                <div class="audio-item">
                    <div>🎵 ${a.name || '未命名'}</div>
                    <audio controls src="${a.data}"></audio>
                    <button class="del-audio" data-index="${i}">✕</button>
                </div>
            `).join('');
            audioList.querySelectorAll('.del-audio').forEach(btn => {
                btn.addEventListener('click', () => {
                    const idx = parseInt(btn.dataset.index);
                    if (!isNaN(idx) && confirm('删除？')) {
                        data.audios.splice(idx, 1);
                        saveData(data);
                        renderAudios();
                    }
                });
            });
        }

        audioFileInput.addEventListener('change', e => {
            const files = e.target.files;
            if (!files) return;
            for (const file of files) {
                if (!file.type.startsWith('audio/')) continue;
                const reader = new FileReader();
                reader.onload = ev => {
                    data.audios.push({ name: file.name, data: ev.target.result, size: file.size });
                    saveData(data);
                    renderAudios();
                };
                reader.readAsDataURL(file);
            }
            audioFileInput.value = '';
        });

        // ----- ESC关闭弹窗 -----
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') {
                if (photoModal.classList.contains('open')) closePhotoModal();
                if (recordModal.classList.contains('open')) closeRecordModal();
            }
        });

        console.log('💕 精简完整版已启动！');
    </script>
</body>
</html>
